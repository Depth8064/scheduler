{{ define "login" }}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ .Title }}</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body data-page="login" class="login-body">
  <main class="login-shell">
    <section class="panel login-card">
      <h1>Scheduler Sign In</h1>
      <p class="notice">Sign in to continue. Admins are routed to management views and workstation users are routed to the operator console.</p>
      <form id="login-form" class="form-row">
        <div>
          <label for="username">Username</label>
          <input id="username" name="username" autocomplete="username" required />
        </div>
        <div>
          <label for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required />
        </div>
        <button type="submit" id="login-submit">Sign in</button>
      </form>
      <p id="login-status" class="notice" style="display:none;" role="status" aria-live="polite"></p>
      <p id="login-error" class="notice notice-error" style="display:none;" role="alert" aria-live="assertive"></p>
    </section>
  </main>

  <script src="/static/app.js" defer></script>
</body>
</html>
{{ end }}
