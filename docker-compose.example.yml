version: '3.9'

services:
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.example
    environment:
      # Local override for compose-managed PostgreSQL
      SCHEDULER_DATABASE_URL: postgres://scheduler:scheduler@db:5432/scheduler?sslmode=disable
    ports:
      - '8080:8080'
    restart: unless-stopped
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: scheduler
      POSTGRES_PASSWORD: scheduler
      POSTGRES_DB: scheduler
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U scheduler']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db-data:
