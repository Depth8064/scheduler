name: CI / CD

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Install dependencies
        run: go mod download
      - name: Run tests
        run: go test ./... -count=1
      - name: Run go vet
        run: go vet ./...

  publish:
    if: github.event_name != 'pull_request'
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Install dependencies
        run: go mod download
      - name: Build binary artifact
        run: |
          mkdir -p bin
          go build -ldflags='-s -w' -o bin/scheduler ./cmd/scheduler
      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: scheduler-binary
          path: bin/scheduler
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Determine container tags
        id: tags
        run: |
          echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY_OWNER}/scheduler" >> $GITHUB_OUTPUT
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            echo "TAGS=main" >> $GITHUB_OUTPUT
          else
            TAG=${GITHUB_REF#refs/tags/}
            TAG=${TAG#v}
            MAJOR=${TAG%%.*}
            MINOR=$(echo "${TAG}" | cut -d. -f1-2)
            echo "TAGS=${TAG},${MINOR},${MAJOR}" >> $GITHUB_OUTPUT
          fi
      - name: Build and push Docker image
        run: |
          IMAGE=${{ steps.tags.outputs.IMAGE }}
          TAGS=${{ steps.tags.outputs.TAGS }}
          ARGS=''
          for t in $(echo "$TAGS" | tr ',' ' '); do
            ARGS="$ARGS -t ${IMAGE}:$t"
          done
          docker buildx build --platform linux/amd64,linux/arm64 --push $ARGS .
