version: '3.9'

services:
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.example
    environment:
      # Compose-managed PostgreSQL connection pieces (avoids DSN escaping issues)
      SCHEDULER_DB_USER: scheduler
      SCHEDULER_DB_PASSWORD: scheduler
      SCHEDULER_DB_HOST: db
      SCHEDULER_DB_PORT: 5432
      SCHEDULER_DB_NAME: scheduler
      SCHEDULER_DB_SSLMODE: disable
    ports:
      - '8080:8080'
    restart: unless-stopped
    healthcheck:
      test: ['CMD', '/scheduler', '--healthcheck']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: scheduler
      POSTGRES_PASSWORD: scheduler
      POSTGRES_DB: scheduler
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U scheduler']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db-data:
